<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>NEPA-PRO</title>
<meta name="description" content="NEPA-PRO — Automating maintenance. Expert property services since 1987.">

<!-- Theme color — updated dynamically by theme toggle JS -->
<meta name="theme-color" content="#05080f" id="themeColor">

<!-- Pre-paint theme bootstrap — prevents flash-of-wrong-theme -->
<script>
  (function () {
    try {
      var t = localStorage.getItem('nepa_theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.setAttribute('data-theme', t);
        var m = document.getElementById('themeColor');
        if (m) m.content = (t === 'light') ? '#f2f2f7' : '#05080f';
      }
    } catch (e) {}
  })();
</script>

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEPA-PRO">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=yes">

<!-- Android / Chrome PWA manifest -->
<link rel="manifest" href="manifest.json">

<style>
/* ═══ DARK MODE tokens (default) ═══ */
:root {
  color-scheme: light dark;

  --ios-bg: #000;
  --ios-sys-1: #1c1c1e;
  --ios-sys-2: #2c2c2e;
  --ios-fill-3: rgba(118,118,128,.24);
  --ios-label: #fff;
  --ios-label-2: rgba(235,235,245,.68);
  --ios-label-3: rgba(235,235,245,.35);
  --ios-sep: rgba(84,84,88,.65);

  --ios-blue: #0a84ff;
  --ios-green: #30d158;
  --ios-indigo: #5e5ce6;
  --ios-orange: #ff9f0a;
  --ios-pink: #ff375f;
  --ios-purple: #bf5af2;
  --ios-red: #ff453a;
  --ios-teal: #40c8e0;
  --ios-yellow: #ffd60a;
  --ios-brown: #ac8e68;

  /* Brand: blue primary with red accent */
  --brand: #0a84ff;
  --brand-alt: #ff453a;
  --brand-deep: #1e3a8a;

  /* Theme-specific surfaces */
  --page-bg: #05080f;
  --page-glow-a: #0e1f3d;     /* deep blue wash */
  --page-glow-b: #2a0e1a;     /* subtle red wash */

  --nav-glass: rgba(14,18,28,.78);
  --tab-glass: rgba(14,18,28,.85);
  --toast-bg: rgba(40,40,44,.96);
  --toast-color: #fff;
  --toast-shadow: 0 10px 30px rgba(0,0,0,.4), 0 4px 10px rgba(0,0,0,.3);

  --widget-blue:   linear-gradient(165deg, #0f2540, #081428);
  --widget-red:    linear-gradient(165deg, #3a0f17, #240a10);
  --widget-indigo: linear-gradient(165deg, #1a1842, #0e0c2a);
  --widget-white:  linear-gradient(165deg, #2a2a2e, #1b1b1e);

  --segmented-track: rgba(118,118,128,.24);
  --segmented-active: #636366;
  --segmented-active-shadow: 0 1px 2px rgba(0,0,0,.2);

  --tier-pop-bg: linear-gradient(180deg, rgba(10,132,255,.18), rgba(10,132,255,.02)), #121a2a;
  --tier-pop-border: rgba(10,132,255,.45);

  --map-bg: linear-gradient(180deg, #0f2540, #081428);
  --map-grid: rgba(255,255,255,.04);
  --map-road: rgba(255,255,255,.08);

  --error-bg: rgba(255,69,58,.10);

  --sf: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Segoe UI", Roboto, sans-serif;

  --radius-card: 14px;
  --radius-lg: 18px;
  --nav-h: 44px;
  --status-h: 0px;
  --tab-h: 83px;

  --sat: env(safe-area-inset-top);
  --sab: env(safe-area-inset-bottom);
}

/* ═══ LIGHT MODE overrides ═══
   Applied when:
   - System preference is light AND user hasn't forced dark, OR
   - User explicitly chose light (via data-theme="light")
═══════════════════════════════════════════════════════════════════ */
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --ios-bg: #f2f2f7;
    --ios-sys-1: #ffffff;
    --ios-sys-2: #e9e9eb;
    --ios-fill-3: rgba(118,118,128,.12);
    --ios-label: #000000;
    --ios-label-2: rgba(60,60,67,.68);
    --ios-label-3: rgba(60,60,67,.32);
    --ios-sep: rgba(60,60,67,.22);

    --ios-blue: #007aff;
    --ios-green: #248a3d;
    --ios-indigo: #5856d6;
    --ios-orange: #c26a00;
    --ios-pink: #d70015;
    --ios-purple: #8944ab;
    --ios-red: #d70015;
    --ios-teal: #0071a4;
    --ios-yellow: #8b6e00;
    --ios-brown: #7f6545;

    /* Brand: blue primary with red accent */
    --brand: #0062cc;
    --brand-alt: #d70015;
    --brand-deep: #1e3a8a;

    --page-bg: #f2f2f7;
    --page-glow-a: #eaf2fd;      /* very subtle blue wash */
    --page-glow-b: #fdeef0;      /* very subtle red wash */

    --nav-glass: rgba(249,249,251,.82);
    --tab-glass: rgba(249,249,251,.88);
    --toast-bg: rgba(250,250,252,.96);
    --toast-color: #000;
    --toast-shadow: 0 10px 30px rgba(0,0,0,.14), 0 4px 10px rgba(0,0,0,.08);

    --widget-blue:   linear-gradient(165deg, #e4f0ff, #cee1f7);
    --widget-red:    linear-gradient(165deg, #ffe7e9, #ffd4d8);
    --widget-indigo: linear-gradient(165deg, #ebebfd, #dadaf9);
    --widget-white:  linear-gradient(165deg, #ffffff, #eff0f5);

    --segmented-track: rgba(118,118,128,.14);
    --segmented-active: #ffffff;
    --segmented-active-shadow: 0 3px 8px rgba(0,0,0,.12), 0 3px 1px rgba(0,0,0,.04);

    --tier-pop-bg: linear-gradient(180deg, rgba(0,98,204,.08), rgba(0,98,204,.01)), #ffffff;
    --tier-pop-border: rgba(0,98,204,.35);

    --map-bg: linear-gradient(180deg, #dbe7f0, #bfd2e1);
    --map-grid: rgba(0,0,0,.05);
    --map-road: rgba(0,0,0,.10);

    --error-bg: rgba(215,0,21,.08);
  }
}

/* ═══ USER-FORCED LIGHT MODE (overrides system) ═══ */
:root[data-theme="light"] {
  --ios-bg: #f2f2f7;
  --ios-sys-1: #ffffff;
  --ios-sys-2: #e9e9eb;
  --ios-fill-3: rgba(118,118,128,.12);
  --ios-label: #000000;
  --ios-label-2: rgba(60,60,67,.68);
  --ios-label-3: rgba(60,60,67,.32);
  --ios-sep: rgba(60,60,67,.22);

  --ios-blue: #007aff;
  --ios-green: #248a3d;
  --ios-indigo: #5856d6;
  --ios-orange: #c26a00;
  --ios-pink: #d70015;
  --ios-purple: #8944ab;
  --ios-red: #d70015;
  --ios-teal: #0071a4;
  --ios-yellow: #8b6e00;
  --ios-brown: #7f6545;

  --brand: #0062cc;
  --brand-alt: #d70015;
  --brand-deep: #1e3a8a;

  --page-bg: #f2f2f7;
  --page-glow-a: #eaf2fd;
  --page-glow-b: #fdeef0;

  --nav-glass: rgba(249,249,251,.82);
  --tab-glass: rgba(249,249,251,.88);
  --toast-bg: rgba(250,250,252,.96);
  --toast-color: #000;
  --toast-shadow: 0 10px 30px rgba(0,0,0,.14), 0 4px 10px rgba(0,0,0,.08);

  --widget-blue:   linear-gradient(165deg, #e4f0ff, #cee1f7);
  --widget-red:    linear-gradient(165deg, #ffe7e9, #ffd4d8);
  --widget-indigo: linear-gradient(165deg, #ebebfd, #dadaf9);
  --widget-white:  linear-gradient(165deg, #ffffff, #eff0f5);

  --segmented-track: rgba(118,118,128,.14);
  --segmented-active: #ffffff;
  --segmented-active-shadow: 0 3px 8px rgba(0,0,0,.12), 0 3px 1px rgba(0,0,0,.04);

  --tier-pop-bg: linear-gradient(180deg, rgba(0,98,204,.08), rgba(0,98,204,.01)), #ffffff;
  --tier-pop-border: rgba(0,98,204,.35);

  --map-bg: linear-gradient(180deg, #dbe7f0, #bfd2e1);
  --map-grid: rgba(0,0,0,.05);
  --map-road: rgba(0,0,0,.10);

  --error-bg: rgba(215,0,21,.08);
}

/* ═══ USER-FORCED DARK MODE (overrides system) ═══
   The :root defaults are already dark, so this rule only needs to exist as an
   anchor so the :not([data-theme="dark"]) selector above correctly excludes it. */
:root[data-theme="dark"] { /* dark tokens already on :root */ }

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; }
html { background: var(--page-bg); }
body {
  font-family: var(--sf);
  font-size: 17px;
  line-height: 1.4;
  color: var(--ios-label);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-optical-sizing: auto;
  letter-spacing: -0.01em;
  overflow: hidden;
  background:
    radial-gradient(ellipse 90vw 70vh at 20% 10%, var(--page-glow-a), transparent 60%),
    radial-gradient(ellipse 90vw 70vh at 80% 90%, var(--page-glow-b), transparent 60%),
    var(--page-bg);
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; color: inherit; background: transparent; border: 0; padding: 0; }
input, textarea, select {
  font: inherit;
  color: inherit;
  background: transparent;
  border: 0;
  outline: none;
}

.stage {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Desktop: iPhone 15 Pro frame */
@media (min-width: 561px) {
  .stage { padding: 28px; }
  .device {
    position: relative;
    width: 430px;
    height: 932px;
    max-height: 96vh;
    aspect-ratio: 430/932;
    border-radius: 55px;
    padding: 10px;
    background: linear-gradient(135deg, #3a3a3d 0%, #1a1a1c 22%, #2a2a2c 50%, #111113 78%, #2e2e30 100%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.04),
      0 1px 0 rgba(255,255,255,.06) inset,
      0 60px 120px -30px rgba(0,0,0,.85),
      0 30px 60px -20px rgba(0,0,0,.6);
    flex-shrink: 0;
  }
  .device::before {
    content: '';
    position: absolute; inset: 2px;
    border-radius: 53px;
    background: linear-gradient(180deg, rgba(255,255,255,.08), transparent 20%, transparent 80%, rgba(255,255,255,.04));
    pointer-events: none;
  }
  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 47px;
    overflow: hidden;
    background: var(--ios-bg);
    isolation: isolate;
  }
}
@media (max-width: 560px) {
  .device { width: 100%; height: 100vh; height: 100dvh; background: var(--ios-bg); }
  .screen { position: relative; width: 100%; height: 100%; background: var(--ios-bg); isolation: isolate; }
}

/* Nav bar */
.nav {
  position: absolute;
  left: 0; right: 0;
  top: var(--status-h);
  height: var(--nav-h);
  padding: 0 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 90;
  background: transparent;
  transition: background .2s, backdrop-filter .2s, border-color .2s;
  border-bottom: 0.5px solid transparent;
}
.nav.is-scrolled {
  background: var(--nav-glass);
  backdrop-filter: saturate(180%) blur(30px);
  -webkit-backdrop-filter: saturate(180%) blur(30px);
  border-bottom-color: var(--ios-sep);
}
.nav__title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.02em;
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
  max-width: 60%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nav.is-scrolled .nav__title { opacity: 1; }
.nav__side {
  min-width: 80px;
  display: flex;
  align-items: center;
}
.nav__side--right { justify-content: flex-end; }
.nav__back {
  color: var(--ios-blue);
  display: none;
  align-items: center;
  gap: 2px;
  padding: 6px 8px;
  font-size: 17px;
  letter-spacing: -0.022em;
  max-width: 100%;
}
.nav__back.is-visible { display: inline-flex; }
.nav__back svg { width: 12px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.nav__back__label {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100px;
}
.nav__btn {
  color: var(--ios-blue);
  padding: 6px 8px;
  display: inline-flex;
  align-items: center;
  min-width: 40px;
  min-height: 34px;
  justify-content: center;
}
.nav__btn svg { width: 22px; height: 22px; fill: currentColor; }

/* Theme toggle icons: only the active state is shown */
.theme-icon { width: 22px; height: 22px; transition: opacity .2s ease, transform .25s cubic-bezier(.4,0,.2,1); }
.nav__btn--theme { transition: transform .12s ease, opacity .12s ease; }
.nav__btn--theme:active { transform: scale(.88); opacity: .7; }
/* Default (dark mode / :root default) — show the sun; user would tap to go to light */
.theme-icon--moon { display: none; }
/* User-forced light OR system-is-light without user-forced-dark → show moon (tap to go dark) */
:root[data-theme="light"] .theme-icon--sun { display: none; }
:root[data-theme="light"] .theme-icon--moon { display: inline-block; }
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) .theme-icon--sun { display: none; }
  :root:not([data-theme="dark"]) .theme-icon--moon { display: inline-block; }
}

@media (max-width: 560px) { .nav { top: var(--sat); } }

/* Scroll */
.scroll {
  position: absolute;
  top: 0; left: 0; right: 0;
  bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  scrollbar-width: none;
  padding-top: calc(var(--status-h) + var(--nav-h));
  padding-bottom: calc(var(--tab-h) + 16px);
}
.scroll::-webkit-scrollbar { display: none; }
@media (max-width: 560px) {
  .scroll {
    padding-top: calc(var(--sat) + var(--nav-h));
    padding-bottom: calc(var(--tab-h) + var(--sab) + 8px);
  }
}

.page { display: none; }
.page.is-active { display: block; animation: pageIn .28s cubic-bezier(.32,.72,0,1); }
.page.is-active.is-root { animation: none; }
@keyframes pageIn {
  from { transform: translateX(22%); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

/* Large title */
.large-title { padding: 10px 16px 16px; }
.large-title h1 {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.022em;
  line-height: 1.08;
  margin: 0;
}
.large-title p {
  margin: 4px 0 0;
  font-size: 15px;
  color: var(--ios-label-2);
  letter-spacing: -0.01em;
}

/* Logo variant of the large title — uses the actual NEPA-PRO brand logo */
.brand-logo {
  margin: 0;
  line-height: 0;
}
.brand-logo img {
  display: block;
  width: 220px;
  max-width: 72%;
  height: auto;
}

/* Centered hero title — used on Shield tab for a premium, ceremonial entry */
.shield-hero {
  padding: 22px 24px 10px;
  text-align: center;
}
.shield-hero__emoji {
  font-size: 64px;
  line-height: 1;
  display: block;
  margin: 0 auto 8px;
  filter: drop-shadow(0 4px 14px rgba(10, 132, 255, .22));
}
.shield-hero h1 {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.024em;
  line-height: 1.08;
  margin: 0;
  text-align: center;
}
.shield-hero p {
  margin: 6px auto 0;
  font-size: 15px;
  color: var(--ios-label-2);
  letter-spacing: -0.01em;
  max-width: 28ch;
  line-height: 1.35;
}
@media (prefers-reduced-motion: no-preference) {
  .shield-hero__emoji { animation: shieldFloat 4s ease-in-out infinite; }
}
@keyframes shieldFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-4px); }
}

/* Tab bar */
.tab-bar {
  position: absolute;
  left: 0; right: 0;
  bottom: 0;
  height: var(--tab-h);
  padding: 6px 0 22px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: var(--tab-glass);
  backdrop-filter: saturate(180%) blur(30px);
  -webkit-backdrop-filter: saturate(180%) blur(30px);
  border-top: 0.5px solid var(--ios-sep);
  z-index: 95;
}
@media (max-width: 560px) {
  .tab-bar {
    height: calc(var(--tab-h) - 22px + var(--sab));
    padding-bottom: var(--sab);
  }
}
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  color: var(--ios-label-2);
  padding: 6px 0 2px;
  transition: color .15s;
}
.tab svg { width: 26px; height: 26px; fill: currentColor; }
.tab__label { font-size: 10px; font-weight: 500; line-height: 1; }
.tab.is-active { color: var(--ios-blue); }
.tab:active { opacity: .5; }

/* Section headers */
.section-header {
  padding: 22px 32px 6px;
  font-size: 13px;
  color: var(--ios-label-2);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  font-weight: 500;
}
.section-footer {
  padding: 8px 32px 4px;
  font-size: 13px;
  color: var(--ios-label-2);
  text-align: center;
}
.section-title {
  padding: 24px 16px 6px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.section-title h2 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.022em;
  margin: 0;
}

/* Inset grouped list */
.list {
  margin: 0 16px;
  background: var(--ios-sys-1);
  border-radius: var(--radius-card);
  overflow: hidden;
}
.row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  min-height: 44px;
  position: relative;
  width: 100%;
  text-align: left;
}
.row + .row::before {
  content: '';
  position: absolute;
  top: 0; left: 56px; right: 0;
  height: 0.5px;
  background: var(--ios-sep);
}
.row:active { background: var(--ios-fill-3); }
.row__icon {
  width: 29px; height: 29px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--ios-blue);
  color: white;
  flex-shrink: 0;
}
.row__icon svg { width: 17px; height: 17px; fill: currentColor; }
.row__icon--green   { background: var(--ios-green); }
.row__icon--orange  { background: var(--ios-orange); }
.row__icon--red     { background: var(--ios-red); }
.row__icon--purple  { background: var(--ios-purple); }
.row__icon--teal    { background: var(--ios-teal); }
.row__icon--indigo  { background: var(--ios-indigo); }
.row__icon--pink    { background: var(--ios-pink); }
.row__icon--brown   { background: var(--ios-brown); }
.row__icon--yellow  { background: var(--ios-yellow); color: #000; }
.row__icon--gray    { background: #636366; }
.row__icon--brand   { background: var(--brand); color: #fff; }

.row__main { flex: 1; min-width: 0; }
.row__title { font-size: 17px; letter-spacing: -0.022em; }
.row__sub {
  font-size: 13px;
  color: var(--ios-label-2);
  margin-top: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.row__value { color: var(--ios-label-2); font-size: 15px; flex-shrink: 0; }
.row__chev { color: var(--ios-label-3); flex-shrink: 0; display: flex; align-items: center; }
.row__chev svg { width: 8px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* Hero card — image top, body below */
.hero-card {
  display: block;
  margin: 4px 16px;
  background: var(--ios-sys-1);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: opacity .12s, transform .12s;
  text-align: left;
  width: calc(100% - 32px);
}
.hero-card:active { opacity: .88; transform: scale(.992); }
.hero-card__img {
  position: relative;
  width: 100%;
  height: 210px;
  background: linear-gradient(135deg, #1a2842, #0f1a2e);
  overflow: hidden;
}
.hero-card__img img { width: 100%; height: 100%; object-fit: cover; }
.hero-card__img::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,.6) 100%);
  pointer-events: none;
}
.hero-card__overlay { position: absolute; left: 18px; right: 18px; bottom: 14px; z-index: 2; }
.hero-card__tag {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--brand);
}
.hero-card__title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.022em;
  line-height: 1.15;
  margin: 6px 0 0;
  color: #fff;
  max-width: 16ch;
}
.hero-card__body { padding: 16px 18px 18px; }
.hero-card__lede {
  font-size: 15px;
  letter-spacing: -0.01em;
  color: var(--ios-label-2);
  margin: 0 0 14px;
  line-height: 1.4;
}
.hero-card__cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 38px;
  padding: 0 16px;
  font-size: 15px;
  font-weight: 600;
  background: var(--brand);
  color: #fff;
  border-radius: 10px;
}
.hero-card__cta svg { width: 15px; height: 15px; fill: currentColor; }

/* 2x2 widget grid */
.widgets {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 4px 16px 0;
}
.widget {
  aspect-ratio: 1;
  min-height: 160px;
  border-radius: var(--radius-lg);
  padding: 16px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  transition: opacity .12s, transform .12s;
  text-align: left;
}
.widget:active { opacity: .85; transform: scale(.97); }
.widget__icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}
.widget__icon svg { width: 22px; height: 22px; fill: currentColor; }
.widget__body { display: flex; flex-direction: column; gap: 2px; }
.widget__tag {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.widget__title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.022em;
  line-height: 1.15;
}
.widget--blue   { background: var(--widget-blue); }
.widget--blue   .widget__icon { background: var(--ios-blue); }
.widget--blue   .widget__tag  { color: var(--ios-blue); }
.widget--red    { background: var(--widget-red); }
.widget--red    .widget__icon { background: var(--ios-red); }
.widget--red    .widget__tag  { color: var(--ios-red); }
.widget--indigo { background: var(--widget-indigo); }
.widget--indigo .widget__icon { background: var(--ios-indigo); }
.widget--indigo .widget__tag  { color: var(--ios-indigo); }
.widget--white  { background: var(--widget-white); }
.widget--white  .widget__icon { background: #3a3a3c; }
.widget--white  .widget__tag  { color: var(--ios-label-2); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 18px;
  height: 44px;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.022em;
  border-radius: 14px;
  background: var(--ios-blue);
  color: #fff;
  transition: opacity .12s, transform .12s;
  text-align: center;
}
.btn:active { opacity: .82; transform: scale(.985); }
.btn--full { width: 100%; }
.btn--brand { background: var(--brand); color: #fff; }
.btn--gray  { background: var(--ios-sys-2); color: var(--ios-label); }
.btn--ghost { background: var(--ios-fill-3); color: var(--ios-label); }
.btn svg { width: 18px; height: 18px; fill: currentColor; }

/* Segmented control */
.segmented {
  display: inline-flex;
  padding: 2px;
  background: var(--segmented-track);
  border-radius: 9px;
  margin: 8px auto 16px;
}
.segmented button {
  padding: 6px 22px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ios-label);
  border-radius: 7px;
  transition: background .2s;
  min-width: 110px;
}
.segmented button[aria-pressed="true"] {
  background: var(--segmented-active);
  font-weight: 600;
  box-shadow: var(--segmented-active-shadow);
}

/* Tier cards */
.tier {
  margin: 10px 16px;
  background: var(--ios-sys-1);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative;
}
.tier--pop {
  background: var(--tier-pop-bg);
  border: 0.5px solid var(--tier-pop-border);
}
.tier__badge {
  display: inline-block;
  background: var(--brand-alt);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 6px;
  margin-bottom: 10px;
}
.tier__head { display: flex; align-items: center; gap: 10px; }
.tier__emoji { font-size: 22px; line-height: 1; }
.tier__name { font-size: 20px; font-weight: 600; letter-spacing: -0.022em; }
.tier__sub { font-size: 13px; color: var(--ios-label-2); margin-top: 3px; }
.tier__price {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin: 14px 0 2px;
}
.tier__price .amt {
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.032em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.tier__price .dollar {
  font-size: 22px;
  font-weight: 600;
  color: var(--ios-label-2);
  align-self: flex-start;
  margin-top: 4px;
}
.tier__price .cad { font-size: 15px; color: var(--ios-label-2); }
.tier__unit { font-size: 13px; color: var(--ios-label-2); margin-bottom: 16px; }
.tier__inherits { font-size: 13px; color: var(--ios-label-2); margin-bottom: 4px; }
.tier__feat {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  font-size: 15px;
  border-top: 0.5px solid var(--ios-sep);
}
.tier__feat:first-of-type { border-top: none; }
.tier__feat svg { width: 16px; height: 16px; fill: var(--ios-green); flex-shrink: 0; }
.tier__cta { margin-top: 14px; }

/* Gallery */
.gallery {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 4px 16px 0;
}
.gallery__item {
  position: relative;
  aspect-ratio: 1;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--ios-sys-1);
  display: block;
}
.gallery__item img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.gallery__item--wide { grid-column: span 2; aspect-ratio: 16/10; }
.gallery__item::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 45%, rgba(0,0,0,.65));
}
.gallery__tag {
  position: absolute;
  left: 12px; bottom: 12px; right: 12px;
  z-index: 2;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.022em;
  color: #fff;
}
.gallery__tag small {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,.8);
  margin-bottom: 2px;
}

/* Quote */
.quote-card {
  margin: 10px 16px;
  background: var(--ios-sys-1);
  border-radius: var(--radius-lg);
  padding: 18px 20px 20px;
}
.quote-card__mark {
  font-family: Georgia, serif;
  font-size: 42px;
  line-height: 1;
  color: var(--brand-alt);
  margin-bottom: -8px;
}
.quote-card__body { font-size: 17px; line-height: 1.35; margin: 0 0 14px; }
.quote-card__cite { display: flex; align-items: center; gap: 10px; }
.quote-card__avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand-alt), var(--brand));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}
.quote-card__meta strong { display: block; font-size: 15px; font-weight: 600; }
.quote-card__meta span { font-size: 13px; color: var(--ios-label-2); }

/* Map card */
.map-card {
  display: block;
  margin: 10px 16px;
  background: var(--ios-sys-1);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: opacity .12s, transform .12s;
}
.map-card:active { opacity: .88; transform: scale(.992); }
.map-card__map {
  height: 160px;
  background:
    radial-gradient(circle at 50% 50%, rgba(10,132,255,.3) 0%, transparent 8%),
    repeating-linear-gradient(0deg, var(--map-grid) 0 1px, transparent 1px 42px),
    repeating-linear-gradient(90deg, var(--map-grid) 0 1px, transparent 1px 42px),
    var(--map-bg);
  position: relative;
}
.map-card__road { position: absolute; background: var(--map-road); }
.map-card__pulse {
  position: absolute;
  top: 50%; left: 50%;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,69,58,.35) 0%, transparent 60%);
  transform: translate(-50%, -50%);
  animation: pulse 2.4s ease-out infinite;
}
.map-card__pin {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -100%);
  color: var(--brand-alt);
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.4));
}
.map-card__pin svg { width: 38px; height: 38px; fill: currentColor; }
@keyframes pulse {
  0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; }
  100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0;   }
}
.map-card__body { padding: 14px 18px 16px; }
.map-card__title { font-size: 17px; font-weight: 600; letter-spacing: -0.022em; }
.map-card__addr { font-size: 13px; color: var(--ios-label-2); margin-top: 3px; }

/* Article body / legal text */
.article-hero { margin: 0 0 4px; }
.article-hero__img {
  width: 100%;
  height: 240px;
  background: linear-gradient(135deg, #1a2842, #0f1a2e);
  overflow: hidden;
  position: relative;
}
.article-hero__img img { width: 100%; height: 100%; object-fit: cover; }
.article-meta {
  padding: 16px 20px 4px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--ios-label-2);
}
.article-meta__cat {
  color: var(--brand);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-size: 11px;
}
.article-meta__dot { color: var(--ios-label-3); }
.article-title {
  padding: 4px 20px 8px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.024em;
  line-height: 1.12;
  margin: 0;
}
.article-body { padding: 4px 20px 8px; }
.article-body p {
  font-size: 17px;
  line-height: 1.5;
  margin: 14px 0;
  color: var(--ios-label);
  letter-spacing: -0.01em;
}
.article-body p.lede {
  font-size: 18px;
  color: var(--ios-label);
  font-weight: 500;
  line-height: 1.4;
}
.article-body h3 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.022em;
  margin: 26px 0 6px;
}
.article-body h4 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.022em;
  margin: 18px 0 2px;
}
.article-body ul { padding-left: 20px; margin: 10px 0; }
.article-body li {
  font-size: 17px;
  line-height: 1.5;
  margin: 6px 0;
  color: var(--ios-label);
  letter-spacing: -0.01em;
}
.article-body strong { font-weight: 600; }
.article-body em { color: var(--ios-label-2); }
.article-body blockquote {
  border-left: 3px solid var(--brand);
  padding: 4px 0 4px 14px;
  margin: 18px 0;
  color: var(--ios-label-2);
  font-style: italic;
}
.article-body hr {
  border: 0;
  height: 0.5px;
  background: var(--ios-sep);
  margin: 20px 0;
}

/* Form fields (iOS inset grouped) */
.form-row {
  display: flex;
  align-items: center;
  padding: 11px 16px;
  min-height: 44px;
  position: relative;
  gap: 12px;
}
.form-row + .form-row::before {
  content: '';
  position: absolute;
  top: 0; left: 16px; right: 0;
  height: 0.5px;
  background: var(--ios-sep);
}
.form-row label {
  font-size: 17px;
  min-width: 84px;
  color: var(--ios-label);
  letter-spacing: -0.022em;
}
.form-row input, .form-row select {
  flex: 1;
  background: transparent;
  color: var(--ios-label);
  font-size: 17px;
  letter-spacing: -0.022em;
  text-align: right;
  width: 100%;
  min-width: 0;
}
.form-row input::placeholder, .form-row select::placeholder { color: var(--ios-label-3); }
.form-row select {
  -webkit-appearance: none;
  appearance: none;
  padding-right: 4px;
}
.form-textarea {
  margin: 0 16px;
  background: var(--ios-sys-1);
  border-radius: var(--radius-card);
  padding: 14px 16px;
}
.form-textarea label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--ios-label-2);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}
.form-textarea textarea {
  width: 100%;
  min-height: 120px;
  color: var(--ios-label);
  font-size: 17px;
  line-height: 1.4;
  letter-spacing: -0.022em;
  resize: none;
}
.form-textarea textarea::placeholder { color: var(--ios-label-3); }

/* Form validation error states */
.form-row { flex-wrap: wrap; }
.form-row.has-error { background: var(--error-bg); }
.form-row.has-error label { color: var(--ios-red); }
.form-row.has-error input,
.form-row.has-error select { color: var(--ios-red); }
.form-row.has-error input::placeholder { color: rgba(215,0,21,.45); }
.form-textarea.has-error { background: var(--error-bg); border: 0.5px solid rgba(215,0,21,.35); }
.form-textarea.has-error label { color: var(--ios-red); }
.form-textarea.has-error textarea { color: var(--ios-red); }
.form-textarea.has-error textarea::placeholder { color: rgba(215,0,21,.45); }
.form-row .form-error {
  flex-basis: 100%;
  order: 10;
  font-size: 13px;
  color: var(--ios-red);
  letter-spacing: -0.005em;
  padding: 2px 0 6px 96px;
  margin: 0;
}
.form-textarea .form-error {
  font-size: 13px;
  color: var(--ios-red);
  letter-spacing: -0.005em;
  padding: 8px 0 0;
  margin: 0;
}

.credits {
  text-align: center;
  font-size: 11px;
  color: var(--ios-label-3);
  padding: 28px 16px 0;
  line-height: 1.6;
}
.credits a { color: var(--ios-label-2); }
.credits a:active { opacity: .6; }

/* Toast */
.toast {
  position: fixed;
  left: 50%;
  top: 30%;
  transform: translate(-50%, -50%) scale(.92);
  background: var(--toast-bg);
  color: var(--toast-color);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: 24px 32px;
  border-radius: 18px;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.01em;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease, transform .25s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  min-width: 180px;
  text-align: center;
  box-shadow: var(--toast-shadow);
}
.toast.is-visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.toast__icon {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--ios-green);
  display: flex;
  align-items: center;
  justify-content: center;
}
.toast__icon svg { width: 26px; height: 26px; fill: #fff; }

/* PWA install banner (bottom-sheet style) */
.install-banner {
  position: fixed;
  left: 12px; right: 12px;
  bottom: calc(12px + var(--tab-h) + var(--sab));
  z-index: 200;
  background: var(--toast-bg);
  color: var(--toast-color);
  backdrop-filter: saturate(180%) blur(30px);
  -webkit-backdrop-filter: saturate(180%) blur(30px);
  border-radius: 16px;
  box-shadow: var(--toast-shadow);
  padding: 14px 14px 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  transform: translateY(120%);
  opacity: 0;
  transition: transform .32s cubic-bezier(.32,.72,0,1), opacity .2s;
  pointer-events: none;
}
.install-banner.is-visible {
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
}
.install-banner__icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--brand);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.install-banner__icon svg { width: 22px; height: 22px; fill: #fff; }
.install-banner__main { flex: 1; min-width: 0; }
.install-banner__title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.2;
}
.install-banner__body {
  font-size: 13px;
  color: var(--ios-label-2);
  line-height: 1.3;
  margin-top: 2px;
}
.install-banner__body .share-hint {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.install-banner__body svg {
  width: 14px; height: 14px;
  fill: none;
  stroke: var(--ios-blue);
  stroke-width: 1.8;
  vertical-align: middle;
}
.install-banner__actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}
.install-banner__btn {
  height: 32px;
  padding: 0 14px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.02em;
  background: var(--ios-blue);
  color: #fff;
  border-radius: 8px;
  white-space: nowrap;
}
.install-banner__btn--dismiss {
  background: transparent;
  color: var(--ios-label-2);
  font-weight: 400;
}
.install-banner__btn:active { opacity: .7; }

/* Stat grid (About page) */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 4px 16px 0;
}
.stat {
  background: var(--ios-sys-1);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.stat__num {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.032em;
  line-height: 1;
  color: var(--brand);
  font-variant-numeric: tabular-nums;
}
.stat__label {
  font-size: 13px;
  color: var(--ios-label-2);
  margin-top: 6px;
  letter-spacing: -0.005em;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="stage">
  <div class="device">
    <div class="screen">

      <div class="nav" id="nav">
        <div class="nav__side">
          <button class="nav__back" id="backBtn" aria-label="Back">
            <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
            <span class="nav__back__label" id="backLabel">Back</span>
          </button>
        </div>
        <span class="nav__title" id="navTitle">Home</span>
        <div class="nav__side nav__side--right">
          <button class="nav__btn nav__btn--theme" id="themeToggle" aria-label="Toggle theme" title="Toggle light / dark">
            <svg class="theme-icon theme-icon--sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4.2" fill="currentColor"/>
              <g stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none">
                <path d="M12 2.5v2.8"/><path d="M12 18.7v2.8"/>
                <path d="M2.5 12h2.8"/><path d="M18.7 12h2.8"/>
                <path d="M5.1 5.1l2 2"/><path d="M16.9 16.9l2 2"/>
                <path d="M5.1 18.9l2-2"/><path d="M16.9 7.1l2-2"/>
              </g>
            </svg>
            <svg class="theme-icon theme-icon--moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.4 14.6a8.6 8.6 0 01-11-11 .7.7 0 00-.9-.9 10 10 0 1012.8 12.8.7.7 0 00-.9-.9z" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="scroll" id="scroll">
        <!-- Pages injected here -->
        <div id="pages"></div>
      </div>

      <nav class="tab-bar">
        <button class="tab is-active" data-tab="home">
          <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9v9h-6v-6h-6v6H3z"/></svg>
          <span class="tab__label">Home</span>
        </button>
        <button class="tab" data-tab="services">
          <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.8-3.8a6 6 0 01-8 8l-6.9 6.9a2.1 2.1 0 01-3-3l6.9-6.9a6 6 0 018-8z"/></svg>
          <span class="tab__label">Services</span>
        </button>
        <button class="tab" data-tab="shield">
          <svg viewBox="0 0 24 24"><path d="M12 2l9 3v7c0 5-3.7 9.3-9 10-5.3-.7-9-5-9-10V5l9-3z"/></svg>
          <span class="tab__label">Shield</span>

    body: `
      <p class="lede">Northeast Pennsylvania winters don't stay cold. They cycle — hard freezes followed by 40-degree thaws, sometimes in the same week. That freeze-thaw rhythm is murder on buildings: it forces water into every hairline crack, lets it expand, and opens the crack wider for next time.</p>
      <p>Getting ready for winter here means planning for the thaw as much as the freeze.</p>

      <h3>Attic insulation comes first</h3>
      <p>Heat loss through the ceiling is what causes most ice dams. Warm attic air melts the bottom layer of snow on the roof; the melt refreezes at the colder eave and backs water up under the shingles. R-49 or better in the attic, properly vented at the soffit and ridge, prevents the cycle.</p>
      <p>Blown-in cellulose is the most economical retrofit — figure $1.50–$2.50 per square foot depending on access.</p>

      <h3>Gutters need to be empty and pitched right</h3>
      <p>Clogged gutters during a thaw-freeze cycle turn into ice loaves that can pull fascia boards clean off the house. Clean them the week after leaves drop. Check the pitch: ¼ inch per 10 feet toward downspouts. Extend downspouts 4–6 feet from the foundation.</p>

      <h3>Water lines near exterior walls need protection</h3>
      <p>Any pipe running through an uninsulated crawl space or up into a kitchen over a garage is at risk. Pipe sleeves are cheap. Heat cable is better for the worst spots. If you're leaving a property vacant, shut the main and drain the lines.</p>

      <h3>Get the heating system tuned</h3>
      <p>Oil or gas, doesn't matter — a $150 annual service catches problems before they leave you cold at 2 AM. Change the filter monthly during heating season. Check CO detectors.</p>

      <blockquote>Do these four things and most NEPA winters pass without drama.</blockquote>

      <h3>Age is the first tell</h3>
      <p>Standard 3-tab shingles last 15–20 years in NEPA's climate. Architectural shingles (dimensional) last 25–30. If your roof is at or past the low end of that range, start looking closely.</p>

      <h3>Signs you're at the end of the road</h3>
      <ul>
        <li>Granules in the gutters or at downspout outlets. Ongoing shedding means the mat is being exposed.</li>
        <li>Curling or cupping at the edges of shingles — a sign the shingle has lost its flexibility.</li>
        <li>Bald spots where granules are gone entirely. The asphalt underneath will fail within a year or two.</li>

        <li>Moss or algae, especially on north-facing slopes. Not immediately destructive but traps moisture.</li>
        <li>Daylight visible in the attic. That one's not subtle.</li>

      <h3>Why NEPA is harder on roofs</h3>
      <p>Freeze-thaw cycling, heavy wet snow, ice damming at the eaves, and the occasional hail storm all compound. A roof that would last 25 years in Virginia might give 20 here.</p>

      <h3>What replacement looks like</h3>
      <p>Tear-off to the deck is preferred — layering a new roof over an old one adds weight and hides deck rot. Expect 1–3 days for an average house. Budget: $5–$9 per square foot installed for architectural shingles; more for cedar, slate, or metal.</p>

      <h3>Timing</h3>
      <p>Spring and fall are best. Hot-roof summer installs can gum up shingles, and winter installs can't bond properly below 40°F.</p>

      <p>Nine times out of ten, it's the flapper. Lift the tank lid, push the flapper down with your finger — if water stops, the flapper isn't sealing. Swap it ($6 at any hardware store, two minutes). If the fill valve is whistling or won't shut off, the fill valve itself is the culprit — $15 kit, twenty minutes.</p>

/* ═══════════════════════════════════════════════════════════════════════
   Navigation stack per tab
═══════════════════════════════════════════════════════════════════════ */
const state = {
  currentTab: 'home',
  stacks: {
    home: ['home'],
    services: ['services'],
    shield: ['shield'],
    articles: ['articles'],
    more: ['more']
  },
  pendingInterest: null
};

function currentPage() {
  const stack = state.stacks[state.currentTab];
  return stack[stack.length - 1];
}

function pushPage(pageId) {
  const targetTab = TAB_ROOT[pageId] || state.currentTab;
  if (targetTab !== state.currentTab) {
    state.currentTab = targetTab;
    // Reset that tab's stack to its root, then push the new page
    state.stacks[targetTab] = [targetTab, pageId];
  } else {
    state.stacks[state.currentTab].push(pageId);
  }
  render();
}

function popPage() {
  const stack = state.stacks[state.currentTab];
  if (stack.length > 1) {
    stack.pop();
    render();
  }
}

function switchTab(tab) {
  if (state.currentTab === tab) {
    // Second tap on current tab resets stack and scrolls to top
    state.stacks[tab] = [tab];
    const scroll = document.getElementById('scroll');
    scroll.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    state.currentTab = tab;
  }
  render();
}
window.switchTab = switchTab;
window.pushPage = pushPage;

function render() {
  const pageId = currentPage();
  const pagesEl = document.getElementById('pages');
  const pageFn = PAGES[pageId];
  if (!pageFn) return;

  pagesEl.innerHTML = '';
  const pageEl = document.createElement('div');
  pageEl.className = 'page is-active';
  if (state.stacks[state.currentTab].length === 1) pageEl.classList.add('is-root');
  pageEl.dataset.page = pageId;
  pageEl.innerHTML = pageFn();
  pagesEl.appendChild(pageEl);

  // Update tab bar
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('is-active', t.dataset.tab === state.currentTab)
  );

  // Update nav title
  document.getElementById('navTitle').textContent = TITLES[pageId] || '';

  // Update back button
  const backBtn = document.getElementById('backBtn');
  const backLabel = document.getElementById('backLabel');
  const stack = state.stacks[state.currentTab];
  if (stack.length > 1) {
    backBtn.classList.add('is-visible');
    const parentId = stack[stack.length - 2];
    backLabel.textContent = TITLES[parentId] || 'Back';
  } else {
    backBtn.classList.remove('is-visible');
  }

  // Reset scroll
  const scroll = document.getElementById('scroll');
  scroll.scrollTo({ top: 0 });
  document.getElementById('nav').classList.remove('is-scrolled');

  // Wire up page events
  wirePageEvents();

  // Pre-fill Interest dropdown if needed
  if (pageId === 'contact' && state.pendingInterest) {
    const sel = document.getElementById('fInterest');
    if (sel) {
      sel.value = state.pendingInterest;
    }
    state.pendingInterest = null;
  }
}

function wirePageEvents() {
  // Navigation triggers
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const pageId = el.dataset.nav;
      const interest = el.dataset.interest;
      if (interest) state.pendingInterest = interest;
      pushPage(pageId);
    });
  });

  // Tab shortcuts from rows
  document.querySelectorAll('.row[data-tab], .widget[data-tab], button[data-tab]:not(.tab)').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      switchTab(el.dataset.tab);
    });
  });

  // Segmented control (Annual/Monthly)
  const segBtns = document.querySelectorAll('.segmented button[data-period]');
  segBtns.forEach(b => b.addEventListener('click', () => {
    const p = b.dataset.period;
    segBtns.forEach(x => x.setAttribute('aria-pressed', x.dataset.period === p));
    document.querySelectorAll('[data-annual]').forEach(el => {
      const v = el.dataset[p];
      if (v !== undefined) el.textContent = v;
    });
  }));

  // Contact form submit — validation + mailto dispatch
  const submitBtn = document.getElementById('submitContact');
  if (submitBtn) {
    // Clear errors as the user types
    ['fName','fEmail','fPhone','fMessage'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('input', () => clearFieldError(id));
    });
    const sel = document.getElementById('fInterest');
    if (sel) sel.addEventListener('change', () => clearFieldError('fInterest'));

    submitBtn.addEventListener('click', () => {
      const name     = document.getElementById('fName').value.trim();
      const email    = document.getElementById('fEmail').value.trim();
      const phone    = document.getElementById('fPhone').value.trim();
      const interest = document.getElementById('fInterest').value;
      const message  = document.getElementById('fMessage').value.trim();

      // Clear prior errors
      clearAllErrors();

      // Validate
      const errors = {};
      if (name.length < 2) {
        errors.fName = 'Please enter your name';
      }
      // RFC-lite email regex — good enough for catching typos
      const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
      if (!email) {
        errors.fEmail = 'Please enter your email';
      } else if (!emailOk) {
        errors.fEmail = 'That doesn\u2019t look like a valid email';
      }
      // Phone is optional, but if provided must have 10+ digits
      if (phone) {
        const digits = phone.replace(/\D/g, '');
        if (digits.length < 10) {
          errors.fPhone = 'Enter at least 10 digits';
        }
      }
      if (message.length < 10) {
        errors.fMessage = 'Please include a short message (10+ characters)';
      }

      // Show errors
      const errorIds = Object.keys(errors);
      if (errorIds.length > 0) {
        errorIds.forEach(id => setFieldError(id, errors[id]));
        showToast(
          errorIds.length === 1
            ? 'Please fix the highlighted field'
            : 'Please fix the ' + errorIds.length + ' highlighted fields',
          false
        );
        // Scroll the first offender into view
        const first = document.getElementById(errorIds[0]);
        if (first) first.focus({ preventScroll: false });
        return;
      }

      // Compose the email
      const subject = 'NEPA-PRO Contact: ' + interest;
      const bodyLines = [
        'New inquiry submitted from the NEPA-PRO app.',
        '',
        'Name:     ' + name,
        'Email:    ' + email,
        'Phone:    ' + (phone || '(not provided)'),
        'Interest: ' + interest,
        '',
        'Message:',
        message,
        '',
        '\u2014\u2014\u2014',
        'Sent ' + new Date().toLocaleString() + ' from nepa-pro app'
      ];
      const mailto = 'mailto:service@nepa-pro.com'
        + '?subject=' + encodeURIComponent(subject)
        + '&body='    + encodeURIComponent(bodyLines.join('\n'));

      // Trigger the user's email client
      window.location.href = mailto;

      // Clear the form
      ['fName','fEmail','fPhone','fMessage'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      if (sel) sel.value = 'General inquiry';

      showToast('Opening your email app\u2026');
    });
  }
}

function setFieldError(fieldId, msg) {
  const input = document.getElementById(fieldId);
  if (!input) return;
  const container = input.closest('.form-row, .form-textarea');
  if (!container) return;
  container.classList.add('has-error');
  // Remove any stale error node
  const stale = container.querySelector('.form-error');
  if (stale) stale.remove();
  const errEl = document.createElement('div');
  errEl.className = 'form-error';
  errEl.textContent = msg;
  container.appendChild(errEl);
}

function clearFieldError(fieldId) {
  const input = document.getElementById(fieldId);
  if (!input) return;
  const container = input.closest('.form-row, .form-textarea');
  if (!container) return;
  container.classList.remove('has-error');
  const err = container.querySelector('.form-error');
  if (err) err.remove();
}

function clearAllErrors() {
  document.querySelectorAll('.form-row.has-error, .form-textarea.has-error').forEach(el => {
    el.classList.remove('has-error');
  });
  document.querySelectorAll('.form-error').forEach(el => el.remove());
}

function showToast(text, success = true) {
  const toast = document.getElementById('toast');
  const icon = toast.querySelector('.toast__icon');
  document.getElementById('toastText').textContent = text;
  icon.style.background = success ? 'var(--ios-green)' : 'var(--ios-red)';
  toast.classList.add('is-visible');
  setTimeout(() => toast.classList.remove('is-visible'), 1800);
}

/* Tab bar events */
document.querySelectorAll('.tab-bar .tab').forEach(t =>
  t.addEventListener('click', () => switchTab(t.dataset.tab))
);

/* Scroll → compact nav bar */
document.getElementById('scroll').addEventListener('scroll', (e) => {
  document.getElementById('nav').classList.toggle('is-scrolled', e.target.scrollTop > 40);
}, { passive: true });

/* ═══ Theme toggle ═══════════════════════════════════════════════════════ */
(function theme() {
  const THEME_KEY  = 'nepa_theme';
  const LIGHT_BG   = '#f2f2f7';
  const DARK_BG    = '#05080f';

  const root       = document.documentElement;
  const btn        = document.getElementById('themeToggle');
  const meta       = document.getElementById('themeColor');
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)');

  function getStored() {
    try {
      const v = localStorage.getItem(THEME_KEY);
      return (v === 'light' || v === 'dark') ? v : null;
    } catch (e) { return null; }
  }

  function resolved() {
    // User preference wins; fall back to system
    return getStored() || (systemDark.matches ? 'dark' : 'light');
  }

  function syncMeta() {
    if (!meta) return;
    meta.content = resolved() === 'light' ? LIGHT_BG : DARK_BG;
  }

  function setTheme(next) {
    try {
      if (next === 'light' || next === 'dark') {
        localStorage.setItem(THEME_KEY, next);
        root.setAttribute('data-theme', next);
      }
    } catch (e) {}
    syncMeta();
  }

  if (btn) {
    btn.addEventListener('click', () => {
      setTheme(resolved() === 'light' ? 'dark' : 'light');
    });
  }

  // Keep the status-bar tint in sync with system changes (when user hasn't chosen)
  systemDark.addEventListener && systemDark.addEventListener('change', () => {
    if (!getStored()) syncMeta();
  });

  // Initial tint
  syncMeta();
})();

/* Back button */
document.getElementById('backBtn').addEventListener('click', popPage);

/* Initial render */
render();

/* ═══════════════════════════════════════════════════════════════════════
   PWA: service worker + install prompt UX
═══════════════════════════════════════════════════════════════════════ */

(function pwa() {
  const INSTALL_DISMISSED_KEY = 'nepa_install_dismissed_until';
  const DISMISS_DAYS = 14;

  // Detect standalone (already installed)
  function isStandalone() {
    return (
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true
    );
  }

  // Detect iOS (Safari only supports "Add to Home Screen" manual flow)
  function isIOS() {
    const ua = navigator.userAgent || '';
    const isIOSDevice = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    // iPadOS 13+ identifies as Mac — check touch
    const isIPadOS = navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1;
    return isIOSDevice || isIPadOS;
  }

  function isAndroid() {
    return /Android/i.test(navigator.userAgent || '');
  }

  function isDismissed() {
    try {
      const until = parseInt(localStorage.getItem(INSTALL_DISMISSED_KEY) || '0', 10);
      return until > Date.now();
    } catch (e) { return false; }
  }

  function markDismissed() {
    try {
      const until = Date.now() + DISMISS_DAYS * 24 * 60 * 60 * 1000;
      localStorage.setItem(INSTALL_DISMISSED_KEY, String(until));
    } catch (e) { /* private browsing etc. */ }
  }

  // ─── Service worker registration ───────────────────────────────────
  if ('serviceWorker' in navigator) {
    // Only register when we're served over http/https (not file://)
    if (location.protocol === 'https:' || location.protocol === 'http:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('sw.js')
          .then((reg) => {
            // Listen for updates
            reg.addEventListener('updatefound', () => {
              const newSW = reg.installing;
              if (!newSW) return;
              newSW.addEventListener('statechange', () => {
                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available — will apply on next full reload
                  console.info('[NEPA-PRO] New version ready. Reload to apply.');
                }
              });
            });
          })
          .catch((err) => {
            // Single-file preview or hosting without sw.js — silent skip
            console.info('[NEPA-PRO] Service worker not available:', err.message);
          });
      });
    }
  }

  // ─── Install banner wiring ─────────────────────────────────────────
  const banner   = document.getElementById('installBanner');
  const title    = document.getElementById('installBannerTitle');
  const body     = document.getElementById('installBannerBody');
  const action   = document.getElementById('installBannerAction');
  const dismiss  = document.getElementById('installBannerDismiss');
  if (!banner) return;

  let deferredPrompt = null;

  function showBanner(opts) {
    title.textContent = opts.title;
    body.innerHTML = opts.body;
    action.textContent = opts.actionLabel;
    action.style.display = opts.actionLabel ? '' : 'none';
    setTimeout(() => banner.classList.add('is-visible'), 50);
  }

  function hideBanner() {
    banner.classList.remove('is-visible');
  }

  dismiss.addEventListener('click', () => {
    hideBanner();
    markDismissed();
  });

  // Android / Chrome install flow
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (isStandalone() || isDismissed()) return;
    setTimeout(() => {
      showBanner({
        title: 'Install NEPA-PRO',
        body: 'Get the full app experience on your home screen.',
        actionLabel: 'Install',
      });
    }, 2500);
  });

  action.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const choice = await deferredPrompt.userChoice;
      deferredPrompt = null;
      hideBanner();
      if (choice.outcome !== 'accepted') markDismissed();
    } else if (isIOS()) {
      // Expand iOS instructions
      body.innerHTML = 'Tap the <strong>Share</strong> icon <span class="share-hint"><svg viewBox="0 0 24 24"><path d="M12 3v13m0-13l-4 4m4-4l4 4M5 14v5a2 2 0 002 2h10a2 2 0 002-2v-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span> then <strong>Add to Home Screen</strong>.';
      action.style.display = 'none';
    }
  });

  window.addEventListener('appinstalled', () => {
    hideBanner();
    deferredPrompt = null;
  });

  // iOS: no beforeinstallprompt — show manual hint once
  if (isIOS() && !isStandalone() && !isDismissed()) {
    setTimeout(() => {
      showBanner({
        title: 'Install NEPA-PRO',
        body: 'Tap the <strong>Share</strong> icon <span class="share-hint"><svg viewBox="0 0 24 24"><path d="M12 3v13m0-13l-4 4m4-4l4 4M5 14v5a2 2 0 002 2h10a2 2 0 002-2v-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span> then <strong>Add to Home Screen</strong>.',
        actionLabel: '',
      });
    }, 3500);
  }
})();
</script>
