<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>NEPA-PRO — Offline</title>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-apple-180.png">
<link rel="icon" href="icons/favicon.png">
<style>
:root {
  --bg: #000;
  --fg: #fff;
  --dim: rgba(235,235,245,.60);
  --sys-1: #1c1c1e;
  --brand: #ff9f0a;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f2f2f7;
    --fg: #000;
    --dim: rgba(60,60,67,.68);
    --sys-1: #fff;
    --brand: #b85f00;
  }
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
  letter-spacing: -0.01em;
}
.icon {
  width: 72px; height: 72px;
  border-radius: 16px;
  background: var(--sys-1);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}
.icon svg { width: 36px; height: 36px; fill: var(--brand); }
h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.024em;
  margin: 0 0 6px;
}
p {
  font-size: 16px;
  color: var(--dim);
  max-width: 320px;
  line-height: 1.4;
  margin: 0 0 24px;
}
button {
  font: inherit;
  background: var(--brand);
  color: #000;
  border: 0;
  padding: 12px 22px;
  border-radius: 12px;
  font-weight: 600;
  letter-spacing: -0.02em;
  font-size: 16px;
  cursor: pointer;
  min-width: 160px;
  min-height: 44px;
}
button:active { opacity: .82; transform: scale(.985); }
a.tel {
  display: inline-block;
  margin-top: 12px;
  font-size: 14px;
  color: var(--dim);
  text-decoration: none;
}
a.tel strong { color: var(--fg); font-weight: 600; }
</style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.07 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>The NEPA-PRO app needs a connection to load fresh content. Reconnect and try again.</p>
  <button onclick="location.reload()">Try again</button>
  <a class="tel" href="tel:8666372776">Need help now? Call <strong>866-637-2776</strong></a>
</body>
</html>
